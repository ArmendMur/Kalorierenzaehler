<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaloTrack – Simpel & Smart</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 850: '#151e2d', 950: '#070b14' } }
                }
            }
        }
    </script>

    <style>
        body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; background-color: #070b14; color: #f8fafc; }
        .glass-card { background: rgba(21, 30, 45, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden-input { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- ICONS ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Plus = (p) => <IconWrapper {...p}><path d="M5 12h14"/><path d="M12 5v14"/></IconWrapper>;
        const Home = (p) => <IconWrapper {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const UserIcon = (p) => <IconWrapper {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
        const Utensils = (p) => <IconWrapper {...p}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconWrapper>;
        const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
        const Check = (p) => <IconWrapper {...p}><polyline points="20 6 9 17 4 12"/></IconWrapper>;
        const Camera = (p) => <IconWrapper {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconWrapper>;
        const Sparkles = (p) => <IconWrapper {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
        const ScanBarcode = (p) => <IconWrapper {...p}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 7v10"/><path d="M12 7v10"/><path d="M17 7v10"/></IconWrapper>;
        const Trash2 = (p) => <IconWrapper {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></IconWrapper>;
        const ArrowLeft = (p) => <IconWrapper {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconWrapper>;
        const ChevronRight = (p) => <IconWrapper {...p}><path d="m9 18 6-6-6-6"/></IconWrapper>;
        const Loader = (p) => <IconWrapper {...p} className="spinner"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>;
        const CloudSearch = (p) => <IconWrapper {...p}><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5c0-2-1.2-3.7-3-4.2c-.3-2.2-2.1-4-4.3-4c-1.7 0-3.2 1-4 2.5c-.5-.2-1-.3-1.5-.3C6 8.5 4 10.5 4 13.2c0 .4.1.8.2 1.1"/><circle cx="11" cy="19" r="3"/><path d="m21 21-4.3-4.3"/></IconWrapper>;

        // --- HELPERS ---
        const calculateBMR = (g, w, h, a) => {
            let bmr = (10 * w) + (6.25 * h) - (5 * a);
            return g === 'male' ? bmr + 5 : bmr - 161;
        };

        const resizeImage = (file, maxWidth = 600) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        // --- COMPONENTS ---
        const ProgressRing = ({ consumed, target }) => {
            const radius = 80;
            const stroke = 12;
            const normRadius = radius - stroke * 2;
            const circ = normRadius * 2 * Math.PI;
            const percent = Math.min(100, (consumed / target) * 100) || 0;
            const offset = circ - (percent / 100) * circ;

            return (
                <div className="relative flex items-center justify-center">
                    <svg height={radius * 2} width={radius * 2} className="transform -rotate-90">
                        <circle stroke="#1e293b" strokeWidth={stroke} fill="transparent" r={normRadius} cx={radius} cy={radius} />
                        <circle stroke="#10b981" strokeWidth={stroke} strokeDasharray={circ + ' ' + circ} style={{ strokeDashoffset: offset, transition: 'stroke-dashoffset 0.5s' }} strokeLinecap="round" fill="transparent" r={normRadius} cx={radius} cy={radius} />
                    </svg>
                    <div className="absolute text-center">
                        <div className="text-3xl font-black text-white">{Math.round(target - consumed)}</div>
                        <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">übrig</div>
                    </div>
                </div>
            );
        };

        const MacroTile = ({ label, value, subLabel, subValue, color, subColor }) => (
            <div className="bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                <div className="flex justify-between items-center mb-1">
                    <span className="text-[10px] font-black text-slate-500 uppercase">{label}</span>
                    <span className={`text-xs font-black ${color}`}>{Math.round(value)}g</span>
                </div>
                {subLabel && (
                    <div className="flex justify-between items-center border-t border-white/5 pt-1 mt-1">
                        <span className="text-[8px] font-black text-slate-600 uppercase">{subLabel}</span>
                        <span className={`text-[10px] font-black ${subColor}`}>{Math.round(subValue)}g</span>
                    </div>
                )}
            </div>
        );

        // --- MAIN APP ---
        function App() {
            const [view, setView] = useState('onboarding');
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('kTrackUser')));
            const [dailyLog, setDailyLog] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('kTrackLog'));
                const today = new Date().toISOString().split('T')[0];
                return (saved && saved.date === today) ? saved : { date: today, items: [] };
            });
            const [customItems, setCustomItems] = useState(() => JSON.parse(localStorage.getItem('kTrackCustom')) || []);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [apiResults, setApiResults] = useState([]);
            const [isThinking, setIsThinking] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [selectedFood, setSelectedFood] = useState(null);
            const [amount, setAmount] = useState(1);
            
            const [onboarding, setOnboarding] = useState({ gender: 'female', age: 30, height: 170, weight: 70, goalWeight: 65, activity: 1.375, geminiApiKey: '' });
            const [customForm, setCustomForm] = useState({ name: '', calories: '', protein: '', carbs: '', sugar: '', fat: '', saturatedFat: '', unsaturatedFat: '', image: null });

            const aiFileRef = useRef();
            const customFileRef = useRef();

            useEffect(() => { if(user) { localStorage.setItem('kTrackUser', JSON.stringify(user)); setView('dashboard'); } }, [user]);
            useEffect(() => localStorage.setItem('kTrackLog', JSON.stringify(dailyLog)), [dailyLog]);
            useEffect(() => localStorage.setItem('kTrackCustom', JSON.stringify(customItems)), [customItems]);

            const totals = useMemo(() => dailyLog.items.reduce((acc, i) => ({
                kcal: acc.kcal + i.calories,
                p: acc.protein + i.protein,
                c: acc.carbs + i.carbs,
                s: acc.sugar + i.sugar,
                f: acc.fat + i.fat,
                sf: acc.saturatedFat + i.saturatedFat,
                uf: acc.unsaturatedFat + i.unsaturatedFat
            }), { kcal: 0, protein: 0, carbs: 0, sugar: 0, fat: 0, saturatedFat: 0, unsaturatedFat: 0 }), [dailyLog]);

            const askGemini = async (text, img = null) => {
                if (!user?.geminiApiKey) return alert("Key fehlt!");
                setIsThinking(true);
                try {
                    let parts = [{ text: `Analysiere das Gericht "${text || 'auf dem Foto'}". Schätze Nährwerte für eine Portion. Gib NUR JSON: {"name":"..","calories":0,"protein":0,"carbs":0,"sugar":0,"fat":0,"saturatedFat":0,"unsaturatedFat":0,"unit":"Portion"}` }];
                    if (img) parts.push({ inline_data: { mime_type: "image/jpeg", data: img.split(',')[1] } });

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${user.geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts }] })
                    });
                    const data = await res.json();
                    const json = JSON.parse(data.candidates[0].content.parts[0].text.match(/\{.*\}/s)[0]);
                    setApiResults([{ ...json, id: Date.now(), isAi: true, image: img }]);
                    if (text) setSearchQuery(text);
                } catch (e) { alert("KI Fehler: " + e.message); }
                finally { setIsThinking(false); }
            };

            const addEntry = (food, mult) => {
                const entry = { ...food, instanceId: Date.now(), calories: Math.round(food.calories * mult), protein: food.protein * mult, carbs: food.carbs * mult, sugar: food.sugar * mult, fat: food.fat * mult, saturatedFat: food.saturatedFat * mult, unsaturatedFat: food.unsaturatedFat * mult, amountDisplay: mult };
                setDailyLog(prev => ({ ...prev, items: [...prev.items, entry] }));
                setView('dashboard');
                setSearchQuery('');
                setApiResults([]);
                setSelectedFood(null);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-24">
                    {/* MODAL */}
                    {selectedFood && (
                        <div className="fixed inset-0 bg-slate-950/90 z-50 flex items-end backdrop-blur-sm p-4">
                            <div className="w-full glass-card rounded-[2.5rem] p-8 animate-in slide-in-from-bottom">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black">{selectedFood.name}</h3>
                                    <button onClick={() => setSelectedFood(null)}><X /></button>
                                </div>
                                <div className="mb-8">
                                    <label className="text-[10px] font-black uppercase text-slate-500 block mb-2 text-center">Menge (Portionen)</label>
                                    <select value={amount} onChange={e => setAmount(Number(e.target.value))} className="w-full p-4 bg-slate-800 rounded-2xl text-center text-xl font-bold appearance-none">
                                        {[0.5, 1, 1.5, 2, 3].map(v => <option key={v} value={v}>{v}x {selectedFood.unit}</option>)}
                                    </select>
                                </div>
                                <button onClick={() => addEntry(selectedFood, amount)} className="w-full bg-emerald-500 text-slate-950 py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-emerald-500/20">Hinzufügen</button>
                            </div>
                        </div>
                    )}

                    {/* VIEWS */}
                    {view === 'onboarding' && (
                        <div className="p-8 pt-20">
                            <h1 className="text-4xl font-black mb-2">KaloTrack</h1>
                            <p className="text-slate-500 font-bold mb-10 uppercase text-xs tracking-widest">Setup in 30 Sekunden</p>
                            <div className="space-y-6">
                                <input type="number" placeholder="Gewicht (kg)" onChange={e => setOnboarding({...onboarding, weight: Number(e.target.value)})} className="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl" />
                                <input type="number" placeholder="Größe (cm)" onChange={e => setOnboarding({...onboarding, height: Number(e.target.value)})} className="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl" />
                                <input type="number" placeholder="Alter" onChange={e => setOnboarding({...onboarding, age: Number(e.target.value)})} className="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl" />
                                <input type="password" placeholder="Gemini API Key" onChange={e => setOnboarding({...onboarding, geminiApiKey: e.target.value})} className="w-full p-4 bg-slate-900 border border-fuchsia-500/20 rounded-2xl text-xs font-mono" />
                                <button onClick={() => {
                                    const bmr = calculateBMR(onboarding.gender, onboarding.weight, onboarding.height, onboarding.age);
                                    setUser({ ...onboarding, target: Math.round(bmr * onboarding.activity) });
                                }} className="w-full bg-emerald-600 py-5 rounded-2xl font-black uppercase tracking-widest">Starten</button>
                            </div>
                        </div>
                    )}

                    {view === 'dashboard' && (
                        <div className="p-6">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-2xl font-black">Heute</h2>
                                <button onClick={() => setView('profile')} className="p-3 glass-card rounded-2xl"><UserIcon size={20} className="text-emerald-400"/></button>
                            </div>

                            <div className="glass-card rounded-[2.5rem] p-6 mb-8 shadow-2xl">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 items-center">
                                    <ProgressRing consumed={totals.kcal} target={user?.target || 2000} />
                                    <div className="grid grid-cols-1 gap-3">
                                        <MacroTile label="Protein" value={totals.p} color="text-fuchsia-400" />
                                        <MacroTile label="Carbs" value={totals.c} subLabel="davon Zucker" subValue={totals.s} color="text-blue-400" subColor="text-blue-300" />
                                        <MacroTile label="Fett" value={totals.f} subLabel="Gesättigt / Unges." subValue={totals.sf} color="text-amber-400" subColor="text-emerald-400" />
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2">Einträge</h3>
                                {dailyLog.items.length === 0 && <div className="text-center py-10 text-slate-600 font-bold uppercase text-[10px] tracking-widest">Noch leer</div>}
                                {dailyLog.items.map(item => (
                                    <div key={item.instanceId} className="glass-card p-4 rounded-3xl flex justify-between items-center">
                                        <div className="flex items-center gap-4">
                                            {item.image ? <img src={item.image} className="w-12 h-12 rounded-xl object-cover" /> : <div className="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center text-slate-600"><Utensils size={20}/></div>}
                                            <div>
                                                <div className="font-bold text-sm">{item.name}</div>
                                                <div className="text-[10px] font-black text-slate-500 uppercase">{item.calories} kcal</div>
                                            </div>
                                        </div>
                                        <button onClick={() => setDailyLog(prev => ({...prev, items: prev.items.filter(i => i.instanceId !== item.instanceId)}))} className="text-slate-600"><Trash2 size={18}/></button>
                                    </div>
                                )).reverse()}
                            </div>
                        </div>
                    )}

                    {view === 'addFood' && (
                        <div className="p-6">
                            <div className="flex items-center gap-4 mb-6">
                                <button onClick={() => setView('dashboard')} className="p-3 glass-card rounded-2xl"><ArrowLeft size={20}/></button>
                                <h2 className="text-2xl font-black">Hinzufügen</h2>
                            </div>
                            
                            <div className="space-y-4 mb-8">
                                <div className="flex gap-2">
                                    <input type="text" placeholder="Suchen oder Beschreiben..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="flex-1 p-4 bg-slate-900 border border-white/5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50" />
                                    <button onClick={() => setIsScanning(true)} className="p-4 bg-blue-600 rounded-2xl shadow-lg"><ScanBarcode size={24}/></button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => askGemini(searchQuery)} disabled={isThinking || searchQuery.length < 2} className="flex-1 bg-fuchsia-600/10 border border-fuchsia-500/20 text-fuchsia-400 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                                        {isThinking ? <Loader size={14}/> : <Sparkles size={14}/>} AI Text
                                    </button>
                                    <button onClick={() => aiFileRef.current.click()} disabled={isThinking} className="flex-1 bg-emerald-600 text-slate-950 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                                        {isThinking ? <Loader size={14}/> : <Camera size={14}/>} AI Foto
                                    </button>
                                </div>
                                <input type="file" accept="image/*" capture="environment" ref={aiFileRef} className="hidden" onChange={async e => {
                                    if(e.target.files[0]) {
                                        const base64 = await resizeImage(e.target.files[0]);
                                        askGemini(null, base64);
                                    }
                                }} />
                            </div>

                            <div className="space-y-3">
                                {apiResults.map(f => (
                                    <div key={f.id} onClick={() => setSelectedFood(f)} className="glass-card p-4 rounded-3xl flex justify-between items-center animate-in zoom-in">
                                        <div className="flex items-center gap-4">
                                            {f.image ? <img src={f.image} className="w-12 h-12 rounded-xl object-cover" /> : <div className="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center text-slate-600"><Utensils size={20}/></div>}
                                            <div><div className="font-bold">{f.name}</div><div className="text-[10px] font-black text-slate-500 uppercase">{f.calories} kcal</div></div>
                                        </div>
                                        <div className="bg-emerald-500/10 text-emerald-400 p-3 rounded-2xl"><Plus size={20}/></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'profile' && (
                        <div className="p-6">
                            <div className="flex items-center gap-4 mb-8">
                                <button onClick={() => setView('dashboard')} className="p-3 glass-card rounded-2xl"><ArrowLeft size={20}/></button>
                                <h2 className="text-2xl font-black">Profil</h2>
                            </div>
                            <div className="glass-card p-6 rounded-[2.5rem] space-y-6">
                                <div><label className="text-[10px] font-black text-slate-500 uppercase block mb-2">Ziel Kalorien</label>
                                <input type="number" value={user?.target} onChange={e => setUser({...user, target: Number(e.target.value)})} className="w-full p-4 bg-slate-800 rounded-2xl font-bold" /></div>
                                <div><label className="text-[10px] font-black text-fuchsia-400 uppercase block mb-2">Gemini API Key</label>
                                <input type="password" value={user?.geminiApiKey} onChange={e => setUser({...user, geminiApiKey: e.target.value})} className="w-full p-4 bg-slate-800 rounded-2xl font-mono text-xs" /></div>
                                <button onClick={() => { if(confirm("App zurücksetzen?")) { localStorage.clear(); window.location.reload(); } }} className="w-full bg-slate-900 border border-rose-500/20 text-rose-500 py-4 rounded-2xl font-black text-[10px] uppercase">Reset</button>
                            </div>
                        </div>
                    )}

                    {/* NAV */}
                    <div className="fixed bottom-6 left-0 right-0 px-6 pointer-events-none">
                        <div className="max-w-md mx-auto h-20 glass-card rounded-[2.5rem] flex items-center justify-around pointer-events-auto shadow-2xl border-t border-white/10">
                            <button onClick={() => setView('dashboard')} className={view==='dashboard'?'text-emerald-400':'text-slate-500'}><Home size={28}/></button>
                            <button onClick={() => setView('addFood')} className="bg-emerald-500 text-slate-950 p-4 rounded-2xl -top-6 relative border-4 border-slate-950"><Plus size={28} strokeWidth={3}/></button>
                            <button onClick={() => setView('profile')} className={view==='profile'?'text-emerald-400':'text-slate-500'}><UserIcon size={28}/></button>
                        </div>
                    </div>

                    {/* BARCODE SCANNER MODAL */}
                    {isScanning && (
                        <div className="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-6">
                            <div className="w-full max-w-md glass-card rounded-[2.5rem] overflow-hidden">
                                <div className="flex justify-between items-center p-6 border-b border-white/5">
                                    <h3 className="font-black">Barcode Scan</h3>
                                    <button onClick={() => setIsScanning(false)}><X/></button>
                                </div>
                                <div id="qr-reader" className="w-full aspect-square bg-black"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
