<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalorien-Zähler – Ultimate</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        slate: { 850: '#151e2d', 950: '#070b14' },
                        brand: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' }
                    },
                    animation: {
                        'pop-in': 'pop-in 0.4s cubic-bezier(0.26, 0.53, 0.74, 1.48) forwards',
                        'success-fade': 'success-fade 1.5s ease-out forwards',
                        'slide-up': 'slide-up 0.3s ease-out forwards',
                        'fade-in': 'fade-in 0.2s ease-out forwards',
                        'zoom-in': 'zoom-in 0.2s ease-out forwards'
                    },
                    keyframes: {
                        'pop-in': { '0%': { transform: 'scale(0.8)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        'success-fade': { '0%': { opacity: '0', transform: 'translateY(10px)' }, '20%': { opacity: '1', transform: 'translateY(0)' }, '80%': { opacity: '1' }, '100%': { opacity: '0' } },
                        'slide-up': { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
                        'fade-in': { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        'zoom-in': { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #070b14; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(21, 30, 45, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #qr-reader { border: none !important; width: 100% !important; background: black !important; }
        #qr-reader video { border-radius: 1.5rem; object-fit: cover !important; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- ICONS ---
        const Icon = ({ d, size = 24, className = "", strokeWidth = "2.5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d}/></svg>
        );
        const PlusIcon = (p) => <Icon d="M12 5v14M5 12h14" {...p} />;
        const MinusIcon = (p) => <Icon d="M5 12h14" {...p} />;
        const UserIcon = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const UtensilsIcon = (p) => <Icon d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" {...p} />;
        const XIcon = (p) => <Icon d="M18 6 6 18M6 6l12 12" {...p} />;
        const CameraIcon = (p) => <Icon d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" {...p} />;
        const SparklesIcon = (p) => <Icon d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" {...p} />;
        const BarcodeIcon = (p) => <Icon d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2" {...p} />;
        const SearchIcon = (p) => <Icon d="m21 21-4.3-4.3M19 11a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" {...p} />;
        const TrashIcon = (p) => <Icon d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" {...p} />;
        const ArrowLeftIcon = (p) => <Icon d="m12 19-7-7 7-7M19 12H5" {...p} />;
        const CheckIcon = (p) => <Icon d="m20 6-11 11-5-5" {...p} />;
        const LoaderIcon = (p) => <Icon d="M21 12a9 9 0 1 1-6.219-8.56" {...p} className="spinner" />;

        // --- HELPERS ---
        const getFoodEmoji = (name = "") => {
            const n = name.toLowerCase();
            if (n.includes("pizza")) return "🍕";
            if (n.includes("burger") || n.includes("pattie")) return "🍔";
            if (n.includes("nudel") || n.includes("pasta") || n.includes("spaghetti") || n.includes("penne") || n.includes("fusilli")) return "🍝";
            if (n.includes("salat") || n.includes("bowl")) return "🥗";
            if (n.includes("apfel") || n.includes("apple")) return "🍎";
            if (n.includes("banane")) return "🍌";
            if (n.includes("sushi") || n.includes("maki")) return "🍣";
            if (n.includes("döner") || n.includes("kebab") || n.includes("pita") || n.includes("gyros")) return "🥙";
            if (n.includes("hähnchen") || n.includes("chicken") || n.includes("geflügel") || n.includes("pute")) return "🍗";
            if (n.includes("steak") || n.includes("fleisch") || n.includes("rind") || n.includes("schwein")) return "🥩";
            if (n.includes("eis") || n.includes("sorbet")) return "🍦";
            if (n.includes("kaffee") || n.includes("espresso") || n.includes("cappuccino") || n.includes("latte")) return "☕";
            if (n.includes("tee")) return "🍵";
            if (n.includes("wasser") || n.includes("sprudel")) return "💧";
            if (n.includes("cola") || n.includes("limo") || n.includes("fanta") || n.includes("sprite") || n.includes("softdrink")) return "🥤";
            if (n.includes("bier") || n.includes("pils") || n.includes("weizen")) return "🍺";
            if (n.includes("wein") || n.includes("sekt")) return "🍷";
            if (n.includes("brot") || n.includes("brötchen") || n.includes("semmel") || n.includes("weck") || n.includes("baguette") || n.includes("toast") || n.includes("ciabatta")) return "🍞";
            if (n.includes("ei ") || n.includes("eier") || n === "ei" || n.includes("omelett") || n.includes("rührei")) return "🥚";
            if (n.includes("milch") || n.includes("hafermilch") || n.includes("mandelmilch")) return "🥛";
            if (n.includes("gemüse") || n.includes("broccoli") || n.includes("gurke") || n.includes("paprika") || n.includes("möhre") || n.includes("karotte")) return "🥦";
            if (n.includes("obst") || n.includes("frucht") || n.includes("beeren") || n.includes("erdbeere") || n.includes("himbeere") || n.includes("blaubeere")) return "🍓";
            if (n.includes("reis") || n.includes("risotto")) return "🍚";
            if (n.includes("suppe") || n.includes("eintopf")) return "🥣";
            if (n.includes("kuchen") || n.includes("torte") || n.includes("muffin") || n.includes("gebäck")) return "🍰";
            if (n.includes("schoko") || n.includes("kakao")) return "🍫";
            if (n.includes("käse") || n.includes("cheese") || n.includes("gouda") || n.includes("mozzarella")) return "🧀";
            if (n.includes("fisch") || n.includes("lachs") || n.includes("thunfisch") || n.includes("garnele")) return "🐟";
            if (n.includes("pommes") || n.includes("fritten")) return "🍟";
            if (n.includes("taco")) return "🌮";
            if (n.includes("burrito") || n.includes("wrap")) return "🌯";
            if (n.includes("popcorn")) return "🍿";
            if (n.includes("pfannkuchen") || n.includes("pancake") || n.includes("crepe")) return "🥞";
            if (n.includes("sandwich") || n.includes("toast")) return "🥪";
            if (n.includes("brezel") || n.includes("pretzel")) return "🥨";
            if (n.includes("hotdog") || n.includes("hot dog")) return "🌭";
            if (n.includes("joghurt") || n.includes("quark") || n.includes("skyr")) return "🍦";
            if (n.includes("kartoffel") || n.includes("kloß")) return "🥔";
            if (n.includes("tomate")) return "🍅";
            if (n.includes("avocado")) return "🥑";
            if (n.includes("nüsse") || n.includes("nuss") || n.includes("mandel") || n.includes("erdnuss")) return "🥜";
            if (n.includes("cookie") || n.includes("keks")) return "🍪";
            if (n.includes("wurst") || n.includes("salami") || n.includes("schinken")) return "🌭";
            if (n.includes("saft") || n.includes("smoothie")) return "🧃";
            return "🍽️";
        };

        const getItemDisplay = (item, isLarge = false) => {
            if (item.image) return <img src={item.image} className={`w-full h-full object-cover ${isLarge ? 'rounded-2xl' : 'rounded-xl'}`} />;
            if (item.emoji) return item.emoji;
            if (item.isBarcode) return getFoodEmoji(item.name);
            return "🍽️";
        };

        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        // --- COMPONENTS ---
        const ProgressRing = ({ consumed, target }) => {
            const radius = 80;
            const normRadius = radius - 12;
            const circ = normRadius * 2 * Math.PI;
            const percent = Math.min(100, (consumed / (target || 1)) * 100) || 0;
            const offset = circ - (percent / 100) * circ;
            const diff = target - consumed;
            return (
                <div className="relative flex items-center justify-center">
                    <svg height={radius * 2} width={radius * 2} className="transform -rotate-90">
                        <circle stroke="#1e293b" strokeWidth={12} fill="transparent" r={normRadius} cx={radius} cy={radius} />
                        <circle stroke={diff < 0 ? "#ef4444" : "#8b5cf6"} strokeWidth={12} strokeDasharray={circ} style={{ strokeDashoffset: offset, transition: 'stroke-dashoffset 0.8s' }} strokeLinecap="round" fill="transparent" r={normRadius} cx={radius} cy={radius} />
                    </svg>
                    <div className="absolute text-center">
                        <div className="text-3xl font-black text-white tracking-tighter">{Math.round(consumed)}</div>
                        <div className={`text-[9px] font-black uppercase tracking-widest ${diff < 0 ? 'text-rose-500' : 'text-slate-500'}`}>
                            {diff < 0 ? `${Math.abs(Math.round(diff))} kcal drüber` : `${Math.round(diff)} kcal übrig`}
                        </div>
                    </div>
                </div>
            );
        };

        const MacroBar = ({ label, value, target, color }) => {
            const percent = Math.min(100, (value / (target || 1)) * 100) || 0;
            return (
                <div className="space-y-1.5">
                    <div className="flex justify-between items-end px-1">
                        <span className="text-[9px] font-black uppercase tracking-wider text-slate-500">{label}</span>
                        <span className="text-[10px] font-bold text-white">{Math.round(value)}g <span className="opacity-30 text-slate-400">/ {target}g</span></span>
                    </div>
                    <div className="h-1.5 w-full bg-slate-800/50 rounded-full overflow-hidden">
                        <div className={`h-full ${color} rounded-full transition-all duration-1000`} style={{ width: `${percent}%` }}></div>
                    </div>
                </div>
            );
        };

        const SubMacroRow = ({ label, value }) => (
            <div className="flex justify-between items-center px-1">
                <span className="text-[8px] font-black uppercase tracking-wider text-slate-600">{label}</span>
                <span className="text-[10px] font-bold text-white">{Math.round(value)}g</span>
            </div>
        );

        // --- MAIN APP ---
        function App() {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('kTrackUser')) || { target: 2000, targetP: 150, targetC: 250, targetF: 70, targetS: 50, geminiApiKey: '' });
            const [view, setView] = useState('dashboard');
            const [dailyLog, setDailyLog] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('kTrackLog'));
                const today = new Date().toISOString().split('T')[0];
                return (saved && saved.date === today) ? saved : { date: today, items: [] };
            });
            const [itemHistory, setItemHistory] = useState(() => JSON.parse(localStorage.getItem('kTrackHistory')) || []);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [apiResults, setApiResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [isThinking, setIsThinking] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [selectedFood, setSelectedFood] = useState(null);
            const [editingInstanceId, setEditingInstanceId] = useState(null);
            const [showDetails, setShowDetails] = useState(null);
            
            const [amount, setAmount] = useState(100);
            const [aiImage, setAiImage] = useState(null);
            const [aiDesc, setAiDesc] = useState('');
            const [showAiModal, setShowAiModal] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [swipeId, setSwipeId] = useState(null);
            const touchStart = useRef(0);

            const aiFileRef = useRef();
            const qrInstance = useRef(null);
            const searchInputRef = useRef(null);

            // LOCAL SEARCH LOGIC
            const triggerSearch = async () => {
                if (searchQuery.length < 1) return;
                setIsSearching(true);
                const query = searchQuery.toLowerCase();
                const results = itemHistory
                    .filter(item => typeof item === 'object' && item !== null && item.name.toLowerCase().includes(query))
                    .map(item => ({
                        ...item,
                        id: item.id || Math.random(),
                        calories: Number(item.baseCalories ?? item.calories ?? 0),
                        protein: Number(item.baseProtein ?? item.protein ?? 0),
                        carbs: Number(item.baseCarbs ?? item.carbs ?? 0),
                        sugar: Number(item.baseSugar ?? item.sugar ?? 0),
                        fat: Number(item.baseFat ?? item.fat ?? 0),
                        saturatedFat: Number(item.baseSaturatedFat ?? item.saturatedFat ?? 0),
                        unsaturatedFat: Number(item.baseUnsaturatedFat ?? item.unsaturatedFat ?? 0),
                    }));
                setApiResults(results);
                setIsSearching(false);
            };

            const handleAiTextClick = () => {
                if (searchQuery.length < 2) {
                    if (searchInputRef.current) searchInputRef.current.focus();
                } else {
                    askGemini(searchQuery);
                }
            };

            useEffect(() => {
                if (searchQuery.length < 1) {
                    setApiResults([]);
                    setIsSearching(false);
                    return;
                }
                const timeout = setTimeout(triggerSearch, 300);
                return () => clearTimeout(timeout);
            }, [searchQuery]);

            useEffect(() => { localStorage.setItem('kTrackUser', JSON.stringify(user)); }, [user]);
            useEffect(() => { localStorage.setItem('kTrackLog', JSON.stringify(dailyLog)); }, [dailyLog]);
            useEffect(() => { localStorage.setItem('kTrackHistory', JSON.stringify(itemHistory)); }, [itemHistory]);

            // BODY SCROLL LOCK: Fixes hit-testing issues on mobile
            useEffect(() => {
                const isModalOpen = !!(selectedFood || showAiModal || showDetails || isScanning);
                document.body.style.overflow = isModalOpen ? 'hidden' : '';
                document.body.style.touchAction = isModalOpen ? 'none' : '';
                return () => {
                    document.body.style.overflow = '';
                    document.body.style.touchAction = '';
                };
            }, [selectedFood, showAiModal, showDetails, isScanning]);

            const handleSafeAction = (fn) => (e) => {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (document.activeElement && document.activeElement.tagName !== 'BODY') document.activeElement.blur();
                setTimeout(fn, 100);
            };

            const totals = useMemo(() => dailyLog.items.reduce((acc, i) => ({
                kcal: acc.kcal + (Number(i.calories) || 0),
                p: acc.p + (Number(i.protein) || 0),
                c: acc.c + (Number(i.carbs) || 0),
                s: acc.s + (Number(i.sugar) || 0),
                f: acc.f + (Number(i.fat) || 0),
                sf: acc.sf + (Number(i.saturatedFat) || 0),
                uf: acc.uf + (Number(i.unsaturatedFat) || 0)
            }), { kcal: 0, p: 0, c: 0, s: 0, f: 0, sf: 0, uf: 0 }), [dailyLog]);

            const frequentItems = useMemo(() => {
                return itemHistory
                    .filter(item => typeof item === 'object' && item !== null)
                    .map(item => ({
                        ...item,
                        // Ensure both base and standard keys exist to prevent NaN in modal/list
                        calories: Number(item.baseCalories ?? item.calories ?? 0),
                        protein: Number(item.baseProtein ?? item.protein ?? 0),
                        carbs: Number(item.baseCarbs ?? item.carbs ?? 0),
                        sugar: Number(item.baseSugar ?? item.sugar ?? 0),
                        fat: Number(item.baseFat ?? item.fat ?? 0),
                        saturatedFat: Number(item.baseSaturatedFat ?? item.saturatedFat ?? 0),
                        unsaturatedFat: Number(item.baseUnsaturatedFat ?? item.unsaturatedFat ?? 0),
                    }))
                    .slice(0, 5);
            }, [itemHistory]);

            const startBarcodeScan = () => {
                setIsScanning(true);
                setTimeout(() => {
                    qrInstance.current = new Html5Qrcode("qr-reader");
                    qrInstance.current.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                        fetchBarcode(text);
                        stopBarcodeScan();
                    }, () => {}).catch(() => { alert("Kamera-Fehler"); setIsScanning(false); });
                }, 300);
            };

            const stopBarcodeScan = () => {
                if(qrInstance.current) { qrInstance.current.stop().then(() => { qrInstance.current.clear(); setIsScanning(false); }).catch(() => setIsScanning(false)); }
            };

            const fetchBarcode = async (code) => {
                try {
                    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                    const data = await res.json();
                    if(data.status === 1) {
                        const p = data.product;
                        const item = {
                            name: p.product_name || "Unbekannt",
                            calories: Math.round(p.nutriments['energy-kcal_100g'] || 0),
                            protein: p.nutriments.proteins_100g || 0,
                            carbs: p.nutriments.carbohydrates_100g || 0,
                            sugar: p.nutriments.sugars_100g || 0,
                            fat: p.nutriments.fat_100g || 0,
                            saturatedFat: p.nutriments['saturated-fat_100g'] || 0,
                            unsaturatedFat: (p.nutriments.fat_100g || 0) - (p.nutriments['saturated-fat_100g'] || 0),
                            image: p.image_front_small_url,
                            isBarcode: true
                        };
                        setSelectedFood(item);
                        const portion = p.serving_quantity ? Number(p.serving_quantity) : 100;
                        setAmount(portion);
                    } else { alert("Produkt nicht gefunden."); }
                } catch (e) { alert("Barcode Fehler."); }
            };

            const askGemini = async (text, img = null) => {
                if (!user.geminiApiKey) return alert("Hinterlege deinen Key im Profil!");
                setIsThinking(true);
                try {
                    const prompt = "Nährwerte/100g für: " + (text || "das Bild") + ". Gib NUR JSON zurück: {name(string), calories(int), protein(float), carbs(float), sugar(float), fat(float), saturatedFat(float), estimatedPortionWeight(int), emoji(string)}. Wähle ein passendes Emoji aus. Falls kein Essen erkannt wird, nutze name:'Unbekannt' and 0-Werte.";
                    
                    let contents = [{ parts: [{ text: prompt }] }];
                    if (img) contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: img.split(',')[1] } });

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${user.geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents })
                    });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    
                    const textContent = data.candidates[0].content.parts[0].text;
                    const jsonMatch = textContent.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("Die KI hat kein erkennbares Format geliefert.");
                    const json = JSON.parse(jsonMatch[0]);
                    
                    setSelectedFood({ ...json, id: Date.now(), isAi: true, image: img });
                    if (json.estimatedPortionWeight) setAmount(json.estimatedPortionWeight);
                    setShowAiModal(false); setAiImage(null); setAiDesc('');
                } catch (e) { alert("KI Fehler: " + e.message); }
                finally { setIsThinking(false); }
            };

            const selectFood = (food) => {
                setSelectedFood(food);
                setAmount(food.lastAmount || 100);
            };

            const addEntry = (food) => {
                const safeAmount = Number(amount) || 0;
                const factor = safeAmount / 100;
                
                const baseCalories = Number(food.baseCalories ?? food.calories ?? 0);
                const baseProtein = Number(food.baseProtein ?? food.protein ?? 0);
                const baseCarbs = Number(food.baseCarbs ?? food.carbs ?? 0);
                const baseSugar = Number(food.baseSugar ?? food.sugar ?? 0);
                const baseFat = Number(food.baseFat ?? food.fat ?? 0);
                const baseSaturatedFat = Number(food.baseSaturatedFat ?? food.saturatedFat ?? 0);
                const baseUnsaturatedFat = Number(food.baseUnsaturatedFat ?? food.unsaturatedFat ?? (baseFat - baseSaturatedFat));

                const entry = { 
                    name: food.name,
                    instanceId: editingInstanceId || Date.now(),
                    calories: Math.round(baseCalories * factor),
                    protein: baseProtein * factor, 
                    carbs: baseCarbs * factor,
                    sugar: baseSugar * factor, 
                    fat: baseFat * factor,
                    saturatedFat: baseSaturatedFat * factor,
                    unsaturatedFat: baseUnsaturatedFat * factor,
                    amountFactor: factor, amountDisplay: `${safeAmount}g`,
                    baseCalories, baseProtein,
                    baseCarbs, baseSugar,
                    baseFat, baseSaturatedFat,
                    baseUnsaturatedFat,
                    emoji: food.emoji,
                    isBarcode: food.isBarcode,
                    // Do not store images for AI scans in daily log to save space
                    image: food.isAi ? null : food.image
                };
                
                if (editingInstanceId) {
                    setDailyLog(prev => ({ ...prev, items: prev.items.map(i => i.instanceId === editingInstanceId ? entry : i) }));
                } else {
                    setDailyLog(prev => ({ ...prev, items: [...prev.items, entry] }));
                    
                    setItemHistory(prev => {
                        const filtered = prev.filter(i => typeof i === 'object' && i !== null && i.name !== food.name);
                        return [{
                            name: food.name,
                            baseCalories,
                            baseProtein,
                            baseCarbs,
                            baseSugar,
                            baseFat,
                            baseSaturatedFat,
                            baseUnsaturatedFat,
                            lastAmount: safeAmount,
                            emoji: food.emoji,
                            isBarcode: food.isBarcode,
                            // Do not store images for AI scanned items to save space
                            image: food.isAi ? null : food.image,
                            id: food.id || Date.now()
                        }, ...filtered].slice(0, 50); 
                    });
                }
                
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 1500);
                
                setView('dashboard');
                setSearchQuery(''); setApiResults([]); setSelectedFood(null); setEditingInstanceId(null); setAmount(100);
            };

            const openEdit = (item) => {
                setSelectedFood({
                    name: item.name,
                    calories: item.baseCalories,
                    protein: item.baseProtein,
                    carbs: item.baseCarbs,
                    sugar: item.baseSugar,
                    fat: item.baseFat,
                    saturatedFat: item.baseSaturatedFat,
                    unsaturatedFat: item.baseUnsaturatedFat,
                    image: item.image
                });
                setAmount(Math.round(item.amountFactor * 100));
                setEditingInstanceId(item.instanceId);
                setShowDetails(null);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-950 text-slate-100 p-6 pb-24 relative overflow-hidden">
                    
                    {/* SUCCESS OVERLAY */}
                    {showSuccess && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[300] bg-brand-500 text-slate-950 px-8 py-4 rounded-full font-black flex items-center gap-3 shadow-2xl animate-success-fade">
                            <CheckIcon size={24} /> Eintragen erfolgreich!
                        </div>
                    )}

                    {/* MODAL: DETAILS */}
                    {showDetails && (
                        <div className="fixed inset-0 bg-slate-950/95 z-[200] flex items-center justify-center p-6 backdrop-blur-xl animate-in zoom-in duration-200">
                            <div className="w-full glass-card rounded-[3rem] p-8 space-y-6 overscroll-contain">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-2xl font-black">{showDetails.name}</h3>
                                        <div className="text-[10px] font-black text-brand-400 uppercase tracking-widest mt-1">Portion: {showDetails.amountDisplay}</div>
                                    </div>
                                    <button onClick={() => setShowDetails(null)} className="p-2 bg-slate-800 rounded-full"><XIcon size={20}/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-center">
                                    <div className="p-4 bg-slate-900 rounded-2xl border border-white/5"><div className="text-[10px] font-black text-slate-500 uppercase mb-1">🔥 Energie</div><div className="text-xl font-black text-brand-400">{Math.round(showDetails.calories)} kcal</div></div>
                                    <div className="p-4 bg-slate-900 rounded-2xl border border-white/5"><div className="text-[10px] font-black text-slate-500 uppercase mb-1">💪 Protein</div><div className="text-xl font-black text-fuchsia-400">{Math.round(showDetails.protein)}g</div></div>
                                    <div className="p-4 bg-slate-900 rounded-2xl border border-white/5 col-span-2 text-left"><div className="text-[10px] font-black text-slate-500 uppercase mb-1">🍞 Kohlenhydrate</div><div className="text-xl font-black text-blue-400">{Math.round(showDetails.carbs)}g <span className="text-xs text-blue-300/40 ml-2">davon {Math.round(showDetails.sugar)}g Zucker</span></div></div>
                                    <div className="p-4 bg-slate-900 rounded-2xl border border-white/5 col-span-2 text-left"><div className="text-[10px] font-black text-slate-500 uppercase mb-1">🥑 Fett</div><div className="text-xl font-black text-amber-400">{Math.round(showDetails.fat)}g <span className="text-xs text-amber-300/40 ml-2">davon {Math.round(showDetails.saturatedFat)}g gesättigt</span></div></div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowDetails(null)} className="flex-1 py-4 bg-slate-800 rounded-2xl font-bold">Schließen</button>
                                    <button onClick={() => openEdit(showDetails)} className="flex-[2] py-4 bg-brand-600 rounded-2xl font-black shadow-lg active:opacity-80">Menge anpassen</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: QUANTITY & STEPPER & LIVE NUTRITION */}
                    {selectedFood && (
                        <>
                            <div className="fixed inset-0 bg-slate-950/90 z-[450] backdrop-blur-sm animate-in fade-in duration-300" onClick={() => {setSelectedFood(null); setEditingInstanceId(null);}}></div>
                            <div className="fixed bottom-4 left-4 right-4 z-[460] glass-card rounded-[3rem] p-8 shadow-2xl border border-white/10 animate-in slide-up duration-300 overscroll-contain max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black text-white">{selectedFood.name}</h3>
                                    <button type="button" onClick={() => {setSelectedFood(null); setEditingInstanceId(null);}} className="p-2 bg-slate-800 rounded-full active:opacity-80"><XIcon size={20}/></button>
                                </div>
                                
                                <div className="space-y-6 mb-8">
                                    <div className="flex items-center gap-4">
                                        <button type="button" onClick={() => setAmount(Math.max(0, (amount||0) - 50))} className="p-5 bg-slate-800 rounded-2xl active:opacity-80 touch-manipulation"><MinusIcon size={20}/></button>
                                        <div className="flex-1 relative">
                                            <input 
                                                type="number" 
                                                inputMode="decimal"
                                                value={amount} 
                                                onFocus={(e) => setTimeout(() => e.target.select(), 50)} 
                                                onChange={e => setAmount(e.target.value === '' ? '' : Number(e.target.value))} 
                                                className="w-full p-5 bg-slate-900 rounded-[1.5rem] text-3xl font-black text-center outline-none focus:ring-2 focus:ring-brand-500 text-white" 
                                            />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 font-black pointer-events-none">g</span>
                                        </div>
                                        <button type="button" onClick={() => setAmount((amount||0) + 50)} className="p-5 bg-brand-500 text-slate-950 rounded-2xl active:opacity-80 touch-manipulation"><PlusIcon size={20}/></button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="p-3 bg-slate-900/50 rounded-xl border border-white/5 text-center">
                                            <div className="text-[8px] font-black text-slate-500 uppercase">🔥 Energie</div>
                                            <div className="text-lg font-black text-brand-400">{Math.round(selectedFood.calories * ((amount||0)/100))} <span className="text-[8px]">kcal</span></div>
                                        </div>
                                        <div className="p-3 bg-slate-900/50 rounded-xl border border-white/5 text-center">
                                            <div className="text-[8px] font-black text-slate-500 uppercase">💪 Protein</div>
                                            <div className="text-lg font-black text-fuchsia-400">{Math.round(selectedFood.protein * ((amount||0)/100))}g</div>
                                        </div>
                                        <div className="p-3 bg-slate-900/50 rounded-xl border border-white/5 text-center col-span-2">
                                            <div className="text-[8px] font-black text-slate-500 uppercase">🍞 Kohlenhydrate</div>
                                            <div className="text-lg font-black text-blue-400">{Math.round(selectedFood.carbs * ((amount||0)/100))}g <span className="text-xs text-blue-300/40 ml-2">davon {Math.round(selectedFood.sugar * ((amount||0)/100))}g Zucker</span></div>
                                        </div>
                                        <div className="p-3 bg-slate-900/50 rounded-xl border border-white/5 text-center col-span-2">
                                            <div className="text-[8px] font-black text-slate-500 uppercase">🥑 Fett</div>
                                            <div className="text-lg font-black text-amber-400">{Math.round(selectedFood.fat * ((amount||0)/100))}g <span className="text-xs text-amber-300/40 ml-2">davon {Math.round(selectedFood.saturatedFat * ((amount||0)/100))}g gesättigt</span></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <button type="button" 
                                    onPointerDown={handleSafeAction(() => addEntry(selectedFood))}
                                    className="w-full bg-brand-500 text-slate-950 py-6 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all touch-manipulation">
                                    {editingInstanceId ? 'Aktualisieren' : 'Bestätigen'}
                                </button>
                            </div>
                        </>
                    )}

                    {/* DASHBOARD */}
                    {view === 'dashboard' && (
                        <div className="animate-in fade-in duration-500">
                            <div className="flex justify-between items-center mb-8 mt-4">
                                <div><h1 className="text-2xl font-black tracking-tighter italic text-white">Kalorien-Zähler</h1><p className="text-[10px] font-black text-slate-600 uppercase tracking-widest mt-1">Heute, {new Date().toLocaleDateString('de-DE', { day: '2-digit', month: 'short' })}</p></div>
                                <button onClick={() => setView('profile')} className="p-4 glass-card rounded-[1.5rem] border border-white/10 active:scale-90 transition-all shadow-lg"><UserIcon size={24} className="text-brand-400"/></button>
                            </div>

                            <div className="glass-card rounded-[3rem] p-8 mb-8 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-brand-500/10 blur-3xl -z-10"></div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-10 items-center">
                                    <ProgressRing consumed={totals.kcal} target={user.target} />
                                    <div className="space-y-4">
                                        <MacroBar label="💪 Protein" value={totals.p} target={user.targetP} color="bg-fuchsia-500" />
                                        <MacroBar label="🍞 Kohlenhydrate" value={totals.c} target={user.targetC} color="bg-blue-500" />
                                        <MacroBar label="🍭 Zucker" value={totals.s} target={user.targetS} color="bg-blue-300" />
                                        <div className="space-y-2">
                                            <MacroBar label="🥑 Fett" value={totals.f} target={user.targetF} color="bg-amber-500" />
                                            <div className="space-y-1">
                                                <SubMacroRow label="⚠️ davon gesättigt" value={totals.sf} color="text-rose-500" />
                                                <SubMacroRow label="🌱 ungesättigt" value={totals.uf} color="text-emerald-500" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => setView('addFood')} className="w-full bg-brand-600 text-white py-6 rounded-[2.5rem] font-black uppercase tracking-widest shadow-2xl shadow-brand-500/20 active:scale-95 transition-all flex items-center justify-center gap-4 mb-12">
                                <PlusIcon size={28} strokeWidth={4} /> Essen hinzufügen
                            </button>

                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] px-4">📅 Tagebuch</h3>
                                <div className="space-y-3">
                                    {dailyLog.items.length === 0 ? (
                                        <div className="py-16 text-center opacity-30 italic text-sm">Keine Einträge heute</div>
                                    ) : (
                                        [...dailyLog.items].reverse().map(item => (
                                            <div key={item.instanceId} onClick={() => setShowDetails(item)} className="glass-card p-4 rounded-[1.8rem] flex justify-between items-center active:scale-[0.98] transition-all cursor-pointer">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-14 h-14 rounded-2xl bg-slate-800/50 flex items-center justify-center text-2xl border border-white/5 shadow-inner">
                                                        {getItemDisplay(item, true)}
                                                    </div>
                                                    <div><div className="font-bold text-white tracking-tight">{item.name}</div><div className="text-[10px] font-black text-slate-500 uppercase mt-0.5">{item.amountDisplay} <span className="mx-1">•</span> {Math.round(item.calories)} kcal</div></div>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); setDailyLog(prev => ({...prev, items: prev.items.filter(i => i.instanceId !== item.instanceId)})); }} className="p-3 text-slate-700 hover:text-rose-500 transition-all"><TrashIcon size={20}/></button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VIEW: ADD FOOD */}
                    {view === 'addFood' && (
                        <div className="animate-in slide-in-from-bottom duration-300 p-2">
                            <div className="flex items-center gap-4 mb-10 mt-4">
                                <button onClick={() => { setView('dashboard'); setApiResults([]); }} className="p-4 glass-card rounded-2xl"><ArrowLeftIcon size={24}/></button>
                                <h2 className="text-3xl font-black tracking-tight text-white">Tracken</h2>
                            </div>

                            <div className="space-y-5 mb-10">
                                <div className="flex gap-2 relative">
                                    <div className="flex-1 relative">
                                        <input 
                                            type="text" 
                                            placeholder="Essen suchen..." 
                                            ref={searchInputRef}
                                            value={searchQuery} 
                                            onChange={e => setSearchQuery(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && triggerSearch()}
                                            className="w-full p-5 pr-14 bg-slate-900 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-brand-500 text-white font-bold shadow-inner" 
                                        />
                                        <button 
                                            onClick={() => triggerSearch()}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 p-3 text-slate-500 hover:text-brand-400 active:scale-90 transition-all"
                                        >
                                            <SearchIcon size={20}/>
                                        </button>
                                    </div>
                                    <button onClick={startBarcodeScan} className="w-20 bg-brand-600 rounded-2xl flex flex-col items-center justify-center gap-1 shadow-lg active:scale-95 transition-all text-slate-950">
                                        <BarcodeIcon size={20}/><span className="text-[8px] font-black uppercase">Barcode</span>
                                    </button>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={handleAiTextClick} disabled={isThinking} className="flex-1 bg-slate-900 border border-white/10 py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2">
                                        {isThinking ? <LoaderIcon size={14}/> : <SparklesIcon size={14} className="text-brand-400"/>} AI Text
                                    </button>
                                    <button onClick={() => aiFileRef.current.click()} disabled={isThinking} className="flex-1 bg-brand-500 text-slate-950 py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 shadow-lg active:scale-95">
                                        <CameraIcon size={16}/> AI Foto
                                    </button>
                                </div>
                                <input type="file" accept="image/*" capture="environment" ref={aiFileRef} className="hidden" onChange={async e => {
                                    if(e.target.files[0]) {
                                        const base64 = await resizeImage(e.target.files[0]);
                                        setAiImage(base64); setShowAiModal(true);
                                    }
                                }} />
                            </div>

                            {/* FAVS */}
                            {!searchQuery && apiResults.length === 0 && (
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-600 uppercase tracking-widest px-2">⭐ Häufig gegessen</h3>
                                    <div className="space-y-3">
                                        {frequentItems.map(item => (
                                            <div 
                                                key={item.name} 
                                                className="relative overflow-hidden rounded-[1.5rem]"
                                                onTouchStart={e => touchStart.current = e.touches[0].clientX}
                                                onTouchEnd={e => {
                                                    const delta = touchStart.current - e.changedTouches[0].clientX;
                                                    if (delta > 80) setSwipeId(item.name);
                                                    if (delta < -80) setSwipeId(null);
                                                }}
                                            >
                                                {/* SUBTLE DELETE BACKGROUND */}
                                                <div 
                                                    onClick={() => {
                                                        setItemHistory(prev => prev.filter(i => i.name !== item.name));
                                                        setSwipeId(null);
                                                    }}
                                                    className="absolute inset-y-0 right-0 w-24 bg-slate-800/80 flex items-center justify-center text-rose-400 font-black uppercase text-[9px] tracking-widest border-l border-white/5"
                                                >
                                                    <TrashIcon size={14} className="mr-1"/> Löschen
                                                </div>
                                                
                                                {/* CARD CONTENT */}
                                                <div 
                                                    onClick={() => selectFood(item)} 
                                                    className={`glass-card p-4 flex justify-between items-center active:scale-[0.98] transition-transform duration-300 relative z-10 cursor-pointer ${swipeId === item.name ? '-translate-x-24' : ''}`}
                                                >
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-10 h-10 rounded-xl bg-slate-800/50 flex items-center justify-center text-xl shadow-inner border border-white/5">{getItemDisplay(item)}</div>
                                                        <div><div className="font-bold text-sm text-white">{item.name}</div><div className="text-[10px] font-black text-slate-500 uppercase">{Math.round(item.baseCalories)} kcal / 100g</div></div>
                                                    </div>
                                                    <PlusIcon size={16} className="text-brand-400"/>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* SEARCH RESULTS */}
                            <div className="space-y-3 mt-4">
                                {apiResults.map(f => (
                                    <div key={f.id} onClick={() => selectFood(f)} className="glass-card p-4 rounded-[2rem] flex justify-between items-center animate-in zoom-in cursor-pointer active:scale-98">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-xl bg-slate-800/50 flex items-center justify-center text-xl border border-white/5 shadow-inner">
                                                {getItemDisplay(f)}
                                            </div>
                                            <div><div className="font-bold text-white">{f.name}</div><div className="text-[10px] font-black text-slate-500 uppercase">{Math.round(f.calories)} kcal / 100g</div></div>
                                        </div>
                                        <div className="p-2 bg-brand-500 text-slate-950 rounded-xl shadow-lg"><PlusIcon size={20}/></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* MODAL: AI PHOTO DESCRIPTION */}
                    {showAiModal && (
                        <>
                            <div className="fixed inset-0 bg-slate-950/95 z-[400] backdrop-blur-xl animate-in fade-in duration-300" onClick={() => {setShowAiModal(false); setAiImage(null);}}></div>
                            <div className="fixed bottom-4 left-4 right-4 z-[410] glass-card rounded-[3rem] p-8 space-y-6 animate-in slide-up duration-300 overscroll-contain max-h-[90vh] overflow-y-auto shadow-2xl border border-white/10">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xl font-black flex items-center gap-3"><CameraIcon className="text-brand-400"/> Foto-Info</h3>
                                    <button type="button" onClick={() => {setShowAiModal(false); setAiImage(null);}} className="p-2 bg-slate-800 rounded-full active:opacity-80"><XIcon size={20}/></button>
                                </div>
                                <img src={aiImage} className="w-full h-24 object-cover rounded-3xl border border-white/10 shadow-2xl" />
                                <textarea 
                                    placeholder="Was genau ist zu sehen?..." 
                                    value={aiDesc} 
                                    onChange={e => setAiDesc(e.target.value)} 
                                    onBlur={() => window.scrollTo(0, 0)}
                                    className="w-full p-5 bg-slate-900 border border-white/5 rounded-2xl focus:ring-2 focus:ring-brand-500 outline-none text-sm h-20 font-medium text-white shadow-inner" 
                                />
                                <div className="flex flex-col gap-3">
                                    <button type="button" 
                                        onPointerDown={handleSafeAction(() => !isThinking && askGemini(aiDesc, aiImage))}
                                        className="w-full py-6 bg-brand-500 text-slate-950 rounded-[2rem] font-black uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all touch-manipulation shadow-xl">
                                        {isThinking ? <LoaderIcon size={20}/> : <><CheckIcon size={20}/> Absenden</>}
                                    </button>
                                    <button type="button" onClick={() => {setShowAiModal(false); setAiImage(null);}} className="w-full py-2 text-slate-500 font-bold text-xs uppercase tracking-widest">Abbrechen</button>
                                </div>
                            </div>
                        </>
                    )}

                    {/* VIEW: PROFILE */}
                    {view === 'profile' && (
                        <div className="animate-in slide-in-from-right duration-300">
                            <div className="flex items-center gap-4 mb-10 mt-4">
                                <button onClick={() => setView('dashboard')} className="p-4 glass-card rounded-2xl active:scale-90"><ArrowLeftIcon size={24}/></button>
                                <h2 className="text-3xl font-black tracking-tight text-white">Ziele</h2>
                            </div>
                            <div className="glass-card p-8 rounded-[3rem] space-y-6 shadow-2xl border border-white/10 overflow-y-auto max-h-[75vh]">
                                <GoalInput label="Energie (kcal)" value={user.target} color="text-brand-400" onChange={v => setUser({...user, target: v})} />
                                <div className="grid grid-cols-2 gap-4">
                                    <GoalInput label="💪 Protein (g)" value={user.targetP} color="text-fuchsia-400" onChange={v => setUser({...user, targetP: v})} />
                                    <GoalInput label="🍞 Kohlenhydrate (g)" value={user.targetC} color="text-blue-400" onChange={v => setUser({...user, targetC: v})} />
                                    <GoalInput label="🥑 Fett (g)" value={user.targetF} color="text-amber-400" onChange={v => setUser({...user, targetF: v})} />
                                    <GoalInput label="🍭 Zucker (g)" value={user.targetS} color="text-blue-300" onChange={v => setUser({...user, targetS: v})} />
                                </div>
                                <div className="pt-8 border-t border-white/5 space-y-2">
                                    <label className="text-[10px] font-black text-fuchsia-400 uppercase tracking-widest block mb-2 px-1">Gemini API Key</label>
                                    <input type="password" value={user.geminiApiKey} onChange={e => setUser({...user, geminiApiKey: e.target.value})} className="w-full p-4 bg-slate-800 rounded-2xl font-mono text-xs border border-white/5 text-white shadow-inner" />
                                </div>
                                <button onClick={() => { if(confirm("App zurücksetzen?")) { localStorage.clear(); window.location.reload(); } }} className="w-full bg-rose-500/5 border border-rose-500/20 text-rose-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest mt-4 active:bg-rose-500/10 transition-all">Reset</button>
                            </div>
                        </div>
                    )}

                    {/* BARCODE SCANNER MODAL */}
                    {isScanning && (
                        <div className="fixed inset-0 bg-slate-950 z-[300] flex flex-col items-center justify-center p-6 backdrop-blur-3xl animate-in zoom-in duration-300">
                            <div className="w-full max-w-md glass-card rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl">
                                <div className="flex justify-between items-center p-8 bg-slate-900/50">
                                    <h3 className="font-black text-xl text-white flex items-center gap-3"><BarcodeIcon size={24} className="text-brand-400"/> Scan</h3>
                                    <button onClick={stopBarcodeScan} className="p-2 bg-slate-800 rounded-full active:scale-90 transition-all"><XIcon size={20}/></button>
                                </div>
                                <div className="p-6">
                                    <div id="qr-reader" className="w-full aspect-square rounded-3xl overflow-hidden border-4 border-slate-900 shadow-inner"></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const GoalInput = ({ label, value, color, onChange }) => (
            <div className="space-y-1">
                <label className="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] block px-1">{label}</label>
                <input 
                    type="number" 
                    value={value || 0} 
                    onChange={e => onChange(Number(e.target.value))} 
                    className={`w-full p-5 bg-slate-900 border border-white/5 rounded-2xl font-black text-xl outline-none focus:ring-2 focus:ring-brand-500/50 shadow-inner ${color}`} 
                />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
