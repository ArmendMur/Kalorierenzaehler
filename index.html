    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (damit der Code im Browser läuft) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Barcode Scanner Bibliothek -->

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            850: '#151e2d',
                            950: '#070b14', 
                        }
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }

    <style>
        body { 
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', sans-serif;
            background-color: #070b14;
        }
        .hidden-input { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* Barcode Scanner Anpassungen */
        #qr-reader { border: none !important; border-radius: 1rem; overflow: hidden; }
        #qr-reader__scan_region { background-color: #070b14; }
        #qr-reader__dashboard_section_csr button { 
            background: #3b82f6; color: white; padding: 10px 20px; border-radius: 12px; margin-top: 10px; border: none; font-weight: 600;
        }
        #qr-reader a { color: #60a5fa; text-decoration: none; }

        .glass-card {
            background: rgba(21, 30, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
    </style>
</head>

        // --- DATENBANK & KONSTANTEN ---

        // --- HILFSFUNKTIONEN ---

        const calculateBMR = (gender, weight, height, age) => {
          let bmr = (10 * weight) + (6.25 * height) - (5 * age);
          return gender === 'male' ? bmr + 5 : bmr - 161;
        };

        const resizeImage = (file, maxWidth = 200) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = maxWidth / img.width;
                        if (scaleSize < 1) {
                            canvas.width = maxWidth;
                            canvas.height = img.height * scaleSize;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        // --- KOMPONENTEN ---

        const ProgressRing = ({ consumed, target, burned }) => {
          const radius = 85;
          const stroke = 12;
          const normalizedRadius = radius - stroke * 2;
          const circumference = normalizedRadius * 2 * Math.PI;
          
          const totalEnergy = target + burned;
          const remaining = target - consumed + burned;
          const percent = Math.min(100, Math.max(0, (consumed / totalEnergy) * 100));
          const strokeDashoffset = circumference - (percent / 100) * circumference;

          let colorClass = 'text-emerald-400';
          if (percent > 85) colorClass = 'text-amber-400';
          if (percent > 100) colorClass = 'text-rose-500';

          return (
            <div className="relative flex items-center justify-center">
              <svg height={radius * 2} width={radius * 2} className="transform -rotate-90 filter drop-shadow-[0_0_8px_rgba(0,0,0,0.5)]">
                <defs>
                   <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stopColor="currentColor" stopOpacity="1" />
                      <stop offset="100%" stopColor="currentColor" stopOpacity="0.8" />
                   </linearGradient>
                </defs>
                <circle stroke="#1e293b" strokeWidth={stroke} fill="transparent" r={normalizedRadius} cx={radius} cy={radius} />
                <circle
                  stroke="url(#ringGradient)" strokeWidth={stroke} strokeDasharray={circumference + ' ' + circumference}
                  style={{ strokeDashoffset, transition: 'stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1)' }}
                  strokeLinecap="round" fill="transparent" r={normalizedRadius} cx={radius} cy={radius}
                  className={colorClass}
                />
              </svg>
              <div className="absolute text-center flex flex-col items-center">
                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Noch übrig</span>
                <span className={`text-4xl font-black tracking-tight ${remaining < 0 ? 'text-rose-500' : 'text-white'}`}>
                  {Math.round(remaining)}
                </span>
                <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">kcal</span>
              </div>
            </div>
          );
        };

        const MacroBar = ({ label, current, total, colorClass, iconColor }) => {
          const percent = Math.min(100, (current / total) * 100) || 0;
          return (
            <div className="flex flex-col w-full group">
              <div className="flex justify-between items-end mb-1.5 px-1">
                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{label}</span>
                <span className="text-[11px] font-bold text-slate-200">
                    {Math.round(current)}<span className="text-slate-500 mx-0.5">/</span>{Math.round(total)}g
                </span>
              </div>
              <div className="h-2 w-full bg-slate-800/50 rounded-full overflow-hidden border border-slate-700/30 p-[1px]">
                <div 
                    className={`h-full rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(0,0,0,0.2)] ${colorClass}`} 
                    style={{ width: `${percent}%` }}
                ></div>
              </div>
            </div>
          );

                            }

                            return (

        // --- HAUPT APP ---

        function CalorieApp() {
          const [view, setView] = useState('onboarding'); 
          const [selectedMeal, setSelectedMeal] = useState('snacks'); 
          const [searchQuery, setSearchQuery] = useState('');
          
          const [showSportMenu, setShowSportMenu] = useState(false);
          const [tempSteps, setTempSteps] = useState('');
          const [tempSportKcal, setTempSportKcal] = useState('');

          const [selectedFoodItem, setSelectedFoodItem] = useState(null);
          const [selectedAmount, setSelectedAmount] = useState(1);

          const [apiResults, setApiResults] = useState([]);
          const [isLoadingApi, setIsLoadingApi] = useState(false);
          const [isThinking, setIsThinking] = useState(false);
          const [isScanning, setIsScanning] = useState(false);

          const customFileInputRef = useRef(null);
          const aiFileInputRef = useRef(null);

          const [user, setUser] = useState(() => {
            const saved = localStorage.getItem('fitTrackUser');
            return saved ? JSON.parse(saved) : null;
          });

          const [customItems, setCustomItems] = useState(() => {
            const saved = localStorage.getItem('fitTrackCustomItems');
            return saved ? JSON.parse(saved) : [];
          });

          const [dailyLog, setDailyLog] = useState(() => {
            const saved = localStorage.getItem('fitTrackLog');
            const today = new Date().toISOString().split('T')[0];
            if (saved) {
              const parsed = JSON.parse(saved);
              if (parsed.date === today) return { ...parsed, steps: parsed.steps || 0 };
            }
            return { date: today, breakfast: [], lunch: [], dinner: [], snacks: [], exercise: 0, steps: 0 };
          });

          const [onboardingData, setOnboardingData] = useState({
            gender: 'female', age: 30, height: 170, weight: 70, goalWeight: 65, activity: 1.375, geminiApiKey: ''
          });

          const [customFood, setCustomFood] = useState({ name: '', calories: '', protein: '', carbs: '', fat: '', image: null });

          const [editingEntry, setEditingEntry] = useState(null);

          useEffect(() => { if (user) localStorage.setItem('fitTrackUser', JSON.stringify(user)); }, [user]);
          useEffect(() => { localStorage.setItem('fitTrackLog', JSON.stringify(dailyLog)); }, [dailyLog]);
          useEffect(() => { localStorage.setItem('fitTrackCustomItems', JSON.stringify(customItems)); }, [customItems]);
          useEffect(() => { if (user) setView('dashboard'); }, []);

          // Barcode Scanner
          useEffect(() => {
            let html5QrcodeScanner;
            if (isScanning) {
                html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, false);
                html5QrcodeScanner.render(
                    (decodedText) => {
                        html5QrcodeScanner.clear();
                        setIsScanning(false);
                        fetchBarcodeProduct(decodedText);
                    }, 
                    (error) => {}
                );
            }
            return () => { if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.error(e)); };
          }, [isScanning]);

          const fetchBarcodeProduct = async (barcode) => {
              setIsLoadingApi(true);
              setSearchQuery(barcode);
              try {
                  const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                  const data = await response.json();
                  if (data.status === 1 && data.product) {
                      const p = data.product;
                      const mappedProduct = {
                          id: 'api_' + p.code,
                          name: p.product_name || 'Unbekanntes Produkt',
                          calories: Math.round(p.nutriments['energy-kcal_100g'] || 0),
                          protein: p.nutriments.proteins_100g || 0,
                          carbs: p.nutriments.carbohydrates_100g || 0,
                          fat: p.nutriments.fat_100g || 0,
                          unit: '100g', 
                          image: p.image_front_small_url || null,
                          isApi: true
                      };
                      setSearchQuery(p.product_name || barcode);
                      setApiResults([mappedProduct]);
                  } else {
                      alert("Produkt nicht in der OpenFoodFacts Datenbank gefunden.");
                      setApiResults([]);
                  }
              } catch (error) {
                  alert("Fehler beim Abrufen der Barcode-Daten.");
              } finally {
                  setIsLoadingApi(false);
              }
          };

          const searchOpenFoodFacts = async () => {
            if (!searchQuery || searchQuery.length < 2) return;
            setIsLoadingApi(true);
            try {
                const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(searchQuery)}&search_simple=1&action=process&json=1&page_size=10`);
                const data = await response.json();
                if (data.products) {
                    const mappedProducts = data.products.map(p => ({
                        id: 'api_' + p.code,
                        name: p.product_name || 'Unbekanntes Produkt',
                        calories: Math.round(p.nutriments['energy-kcal_100g'] || 0),
                        protein: p.nutriments.proteins_100g || 0,
                        carbs: p.nutriments.carbohydrates_100g || 0,
                        fat: p.nutriments.fat_100g || 0,
                        unit: '100g', 
                        image: p.image_front_small_url || null,
                        isApi: true
                    })).filter(p => p.calories > 0); 
                    setApiResults(mappedProducts);
                }
            } catch (error) {
                alert("Fehler bei der Online-Suche. Bitte Internet prüfen.");
            } finally {
                setIsLoadingApi(false);
            }
          };

          const askGeminiForNutrition = async () => {
            if (!searchQuery || searchQuery.length < 2) return;
            if (!user?.geminiApiKey) {
                alert("Bitte hinterlege zuerst deinen Gemini API-Key in den Profileinstellungen.");
                setView('profile');
                return;
            }
            setIsThinking(true);
            try {
                const promptText = `Analysiere das Gericht "${searchQuery}". Schätze Nährwerte für eine Portion. Gib NUR valides JSON zurück: {"name": "Name", "calories": Zahl, "protein": Zahl, "carbs": Zahl, "fat": Zahl, "unit": "Portion"}`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${user.geminiApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                if (!response.ok) throw new Error("API-Fehler. Ist der Key korrekt?");
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const foodData = JSON.parse(jsonMatch[0]);
                        setApiResults([{ id: 'ai_' + Date.now(), ...foodData, isApi: false, isAi: true }]); 
                    }
                }
            } catch (error) {
                alert("Konnte keine AI-Schätzung durchführen: " + error.message);
            } finally {
                setIsThinking(false);
            }
          };

          const handleAiImageUpload = async (e) => {
            if (e.target.files && e.target.files[0]) {
                if (!user?.geminiApiKey) {
                    alert("Bitte hinterlege zuerst deinen Gemini API-Key in den Profileinstellungen.");
                    setView('profile');
                    return;
                }
                const base64ImgWithPrefix = await resizeImage(e.target.files[0], 600);
                const base64Img = base64ImgWithPrefix.split(',')[1]; 
                const mimeType = base64ImgWithPrefix.split(';')[0].split(':')[1];
                
                setIsThinking(true);
                try {
                    const promptText = "Analysiere dieses Bild. Was für ein Gericht ist das? Schätze die Nährwerte für die abgebildete Portion. Gib NUR valides JSON zurück: {\"name\": \"Name\", \"calories\": Zahl, \"protein\": Zahl, \"carbs\": Zahl, \"fat\": Zahl, \"unit\": \"Portion\"}";
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${user.geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptText },
                                    { inline_data: { mime_type: mimeType, data: base64Img } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Unbekannter API-Fehler bei Bildanalyse");
                    }
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        const jsonMatch = text.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            const foodData = JSON.parse(jsonMatch[0]);
                            setApiResults([{
                                id: 'ai_' + Date.now(),
                                ...foodData,
                                image: base64ImgWithPrefix,
                                isApi: false, 
                                isAi: true 
                            }]);
                            setSearchQuery("Foto-Analyse: " + foodData.name);
                        }
                    }
                } catch (error) {
                    alert("Fehler bei der AI-Bildanalyse: " + error.message);
                } finally {
                    setIsThinking(false);
                    if(aiFileInputRef.current) aiFileInputRef.current.value = "";
                }
            }
          };

          const handleCustomImageUpload = async (e) => {
            if (e.target.files && e.target.files[0]) {
                const base64Img = await resizeImage(e.target.files[0], 200);
                setCustomFood(prev => ({ ...prev, image: base64Img }));
            }
          };

          const calculateTargets = (data) => {
            const bmr = calculateBMR(data.gender, data.weight, data.height, data.age);
            const tdee = bmr * data.activity;
            let target = Math.round(tdee);
            if (data.goalWeight < data.weight) target -= 500; 
            else if (data.goalWeight > data.weight) target += 300; 
            const macroTargets = {
              carbs: Math.round((target * 0.5) / 4),
              protein: Math.round((target * 0.25) / 4),
              fat: Math.round((target * 0.25) / 9)
            };
            return { bmr, tdee, target, macroTargets };
          };

          const completeOnboarding = () => {
            const { bmr, tdee, target, macroTargets } = calculateTargets(onboardingData);
            setUser({ ...onboardingData, bmr, tdee, target, macroTargets });
            setView('dashboard');
          };

          const handleFoodClick = (food) => {
            setSelectedFoodItem(food);
            setSelectedAmount(1); 
            setEditingEntry(null);
          };

          const handleEditClick = (mealId, item) => {
            const baseAmount = item.amountDisplay || 1;
            const baseFood = {
                ...item,
                calories: item.calories / baseAmount,
                protein: item.protein / baseAmount,
                carbs: item.carbs / baseAmount,
                fat: item.fat / baseAmount,
                unit: item.unit
            };
            setSelectedFoodItem(baseFood);
            setSelectedAmount(baseAmount);
            setEditingEntry({ mealId, instanceId: item.instanceId });
          };

          const confirmAddFood = () => {
            if (selectedFoodItem) {
              if (editingEntry) {
                updateFoodInLog(editingEntry.mealId, editingEntry.instanceId, selectedAmount);
              } else {
                addFoodToLog(selectedFoodItem, selectedAmount);
              }
              setSelectedFoodItem(null); 
              setEditingEntry(null);
            }
          };

          const addFoodToLog = (food, amount = 1) => {
            const entry = {
              ...food,
              instanceId: Date.now(),
              calories: Math.round(food.calories * amount),
              protein: Math.round(food.protein * amount),
              carbs: Math.round(food.carbs * amount),
              fat: Math.round(food.fat * amount),
              amountDisplay: amount,
              image: food.image || null 
            };
            setDailyLog(prev => ({ ...prev, [selectedMeal]: [...prev[selectedMeal], entry] }));
            setView('dashboard');
            setSearchQuery('');
            setApiResults([]);
          };

          const updateFoodInLog = (mealId, instanceId, amount) => {
            setDailyLog(prev => {
                const newMealLog = prev[mealId].map(item => {
                    if (item.instanceId === instanceId) {
                        return {
                            ...item,
                            calories: Math.round(selectedFoodItem.calories * amount),
                            protein: Math.round(selectedFoodItem.protein * amount),
                            carbs: Math.round(selectedFoodItem.carbs * amount),
                            fat: Math.round(selectedFoodItem.fat * amount),
                            amountDisplay: amount
                        };
                    }
                    return item;
                });
                return { ...prev, [mealId]: newMealLog };
            });
          };

          const updateSport = (type) => {
            if (type === 'steps' && !isNaN(parseInt(tempSteps))) {
                setDailyLog(prev => ({ ...prev, steps: parseInt(tempSteps) })); 
            } else if (type === 'manual' && !isNaN(parseInt(tempSportKcal))) {
                setDailyLog(prev => ({ ...prev, exercise: prev.exercise + parseInt(tempSportKcal) }));
            }
            setTempSteps('');
            setTempSportKcal('');
            setShowSportMenu(false);
          };

          const removeFood = (mealType, instanceId) => {
            setDailyLog(prev => ({ ...prev, [mealType]: prev[mealType].filter(item => item.instanceId !== instanceId) }));
          };

          const handleAddCustomFood = () => {
            if(!customFood.name || !customFood.calories) return;
            const newFood = {
              id: Date.now(), 
              name: customFood.name,
              calories: Number(customFood.calories),
              protein: Number(customFood.protein) || 0,
              carbs: Number(customFood.carbs) || 0,
              fat: Number(customFood.fat) || 0,
              unit: 'Portion',
              image: customFood.image 
            };
            setCustomItems(prev => [...prev, newFood]);
            addFoodToLog(newFood, 1);
            setCustomFood({ name: '', calories: '', protein: '', carbs: '', fat: '', image: null });
          };

          const totals = useMemo(() => {
            const allMeals = [...dailyLog.breakfast, ...dailyLog.lunch, ...dailyLog.dinner, ...dailyLog.snacks];
            const stepsCalories = Math.round(dailyLog.steps * 0.04);
            const totalBurned = dailyLog.exercise + stepsCalories;

            return allMeals.reduce((acc, item) => ({
              calories: acc.calories + item.calories,
              protein: acc.protein + item.protein,
              carbs: acc.carbs + item.carbs,
              fat: acc.fat + item.fat,
              totalBurned: totalBurned,
              stepsCalories: stepsCalories
            }), { calories: 0, protein: 0, carbs: 0, fat: 0, totalBurned: 0, stepsCalories: 0 });
          }, [dailyLog]);


          // --- VIEWS RENDERING ---
          return (
            <div className="min-h-screen bg-slate-950 font-sans text-slate-100 overflow-x-hidden relative">
              
              {/* GLOBAL MODAL FÜR MENGENAUSWAHL (In jeder View sichtbar) */}
              {selectedFoodItem && (
                    <div className="fixed inset-0 bg-slate-950/80 z-[70] flex flex-col justify-end backdrop-blur-md animate-in fade-in duration-300">
                        <div className="glass-card rounded-t-[3rem] p-8 shadow-[0_-20px_50px_rgba(0,0,0,0.5)] animate-in slide-in-from-bottom duration-500 border-t border-white/10 relative overflow-hidden max-w-md mx-auto w-full">
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-slate-800 rounded-full mt-3"></div>
                            
                            <div className="flex justify-between items-start mb-10 mt-4">
                                <div className="flex items-center gap-5">
                                    {selectedFoodItem.image ? (
                                        <img src={selectedFoodItem.image} alt="" className="w-20 h-20 rounded-[1.5rem] object-cover bg-slate-800 border-2 border-white/10 shadow-2xl" />
                                    ) : (
                                        <div className="w-20 h-20 rounded-[1.5rem] bg-slate-800 border border-white/10 flex items-center justify-center text-slate-500 shadow-inner">
                                            <Utensils size={32} />
                                        </div>
                                    )}
                                    <div>
                                        <h3 className="text-2xl font-black text-white tracking-tight leading-tight">{selectedFoodItem.name}</h3>
                                        <div className="flex flex-col mt-2">
                                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">{Math.round(selectedFoodItem.calories)} kcal / {selectedFoodItem.unit}</p>
                                            <div className="flex gap-4 mt-2">
                                                <div className="flex flex-col"><span className="text-[8px] font-black text-slate-600 uppercase tracking-tighter">Prot</span><span className="text-xs font-black text-fuchsia-400">{Math.round(selectedFoodItem.protein)}g</span></div>
                                                <div className="flex flex-col"><span className="text-[8px] font-black text-slate-600 uppercase tracking-tighter">Carbs</span><span className="text-xs font-black text-blue-400">{Math.round(selectedFoodItem.carbs)}g</span></div>
                                                <div className="flex flex-col"><span className="text-[8px] font-black text-slate-600 uppercase tracking-tighter">Fat</span><span className="text-xs font-black text-amber-400">{Math.round(selectedFoodItem.fat)}g</span></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => { setSelectedFoodItem(null); setEditingEntry(null); }} className="p-3 bg-slate-800/50 rounded-2xl text-slate-400 hover:text-white transition-all active:scale-90 border border-white/5">
                                    <X size={24} />
                                </button>
                            </div>

                            <div className="mb-10">
                                <label className="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 text-center">Portionsgröße wählen</label>
                                <div className="relative">
                                    <select 
                                        value={selectedAmount} 
                                        onChange={(e) => setSelectedAmount(Number(e.target.value))}
                                        className="w-full p-6 text-2xl bg-slate-800/50 border border-white/5 rounded-[2rem] focus:outline-none focus:ring-4 focus:ring-emerald-500/20 appearance-none text-center font-black text-white shadow-inner"
                                        style={{ textAlignLast: 'center' }}
                                    >
                                        {[0.25, 0.5, 0.75, 1, 1.5, 2, 2.5, 3, 4, 5, 10].map(val => (
                                            <option key={val} value={val}>{val} x {selectedFoodItem.unit}</option>
                                        ))}
                                    </select>
                                    <div className="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none opacity-30">
                                        <ChevronRight size={24} className="rotate-90"/>
                                    </div>
                                </div>
                                <div className="mt-4 text-center">
                                    <span className="text-4xl font-black text-emerald-400 tracking-tighter">
                                        {Math.round(selectedFoodItem.calories * selectedAmount)}
                                    </span>
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">kcal gesamt</span>
                                </div>
                            </div>

                            <button onClick={confirmAddFood} className="w-full bg-emerald-500 text-slate-950 py-6 rounded-[2rem] font-black text-lg tracking-tight shadow-[0_15px_30px_rgba(16,185,129,0.3)] transition-all active:scale-95 flex justify-center items-center gap-3">
                                <Check size={28} strokeWidth={3} /> {editingEntry ? 'Aktualisieren' : 'Bestätigen'}
                            </button>
                            <div className="h-6"></div>
                        </div>
                    </div>
              )}

              {/* RENDER CURRENT VIEW */}
              {view === 'onboarding' && (
                <div className="min-h-screen bg-slate-950 flex flex-col p-6 items-center justify-center font-sans text-slate-100 overflow-x-hidden relative">
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-gradient-radial from-emerald-500/10 to-transparent opacity-50 pointer-events-none"></div>
                    <div className="w-full max-w-md glass-card p-10 rounded-[3rem] shadow-2xl border border-white/5 relative z-10 animate-in fade-in zoom-in-95 duration-700">
                        <div className="flex justify-center mb-10">
                            <div className="p-6 bg-emerald-500/10 rounded-[2rem] border border-emerald-500/20 shadow-2xl shadow-emerald-500/10 animate-bounce-subtle">
                                <Activity size={56} className="text-emerald-400" />
                            </div>
                        </div>
                        <h1 className="text-4xl font-black text-center mb-3 tracking-tighter text-white">Willkommen!</h1>
                        <p className="text-center text-slate-500 text-xs font-bold uppercase tracking-[0.2em] mb-12">Lass uns deinen Bedarf berechnen.</p>
                        <div className="space-y-8">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 block ml-1">Geschlecht</label>
                                <div className="flex gap-4">
                                    <button onClick={() => setOnboardingData({...onboardingData, gender: 'male'})} className={`flex-1 py-4 rounded-2xl border-2 font-black text-xs uppercase tracking-widest transition-all ${onboardingData.gender === 'male' ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400 shadow-lg shadow-emerald-500/10' : 'border-slate-800 bg-slate-800/30 text-slate-500'}`}>Mann</button>
                                    <button onClick={() => setOnboardingData({...onboardingData, gender: 'female'})} className={`flex-1 py-4 rounded-2xl border-2 font-black text-xs uppercase tracking-widest transition-all ${onboardingData.gender === 'female' ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400 shadow-lg shadow-emerald-500/10' : 'border-slate-800 bg-slate-800/30 text-slate-500'}`}>Frau</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1 block">Alter</label>
                                    <input type="number" value={onboardingData.age} onChange={(e) => setOnboardingData({...onboardingData, age: Number(e.target.value)})} className="w-full p-4 bg-slate-800/50 border border-white/5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white font-bold shadow-inner" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1 block">Größe (cm)</label>
                                    <input type="number" value={onboardingData.height} onChange={(e) => setOnboardingData({...onboardingData, height: Number(e.target.value)})} className="w-full p-4 bg-slate-800/50 border border-white/5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white font-bold shadow-inner" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1 block">Gewicht (kg)</label>
                                    <input type="number" value={onboardingData.weight} onChange={(e) => setOnboardingData({...onboardingData, weight: Number(e.target.value)})} className="w-full p-4 bg-slate-800/50 border border-white/5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white font-bold shadow-inner" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1 block">Ziel (kg)</label>
                                    <input type="number" value={onboardingData.goalWeight} onChange={(e) => setOnboardingData({...onboardingData, goalWeight: Number(e.target.value)})} className="w-full p-4 bg-slate-800/50 border border-white/5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white font-bold shadow-inner" />
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 block ml-1">Aktivitätslevel</label>
                                <div className="relative">
                                    <select value={onboardingData.activity} onChange={(e) => setOnboardingData({...onboardingData, activity: Number(e.target.value)})} className="w-full p-4 bg-slate-800/50 border border-white/5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 text-white font-bold shadow-inner appearance-none transition-all">
                                        {ACTIVITY_LEVELS.map(level => (<option key={level.value} value={level.value}>{level.label}</option>))}
                                    </select>
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-30"><ChevronRight size={20} className="rotate-90"/></div>
                                </div>
                            </div>
                            <div className="pt-4 border-t border-white/5">
                                <label className="text-[10px] font-black text-fuchsia-400 uppercase tracking-[0.2em] mb-3 block ml-1">Gemini API Key (für KI-Funktionen)</label>
                                <input 
                                    type="password" 
                                    placeholder="AIzaSy..." 
                                    value={onboardingData.geminiApiKey} 
                                    onChange={(e) => setOnboardingData({...onboardingData, geminiApiKey: e.target.value})} 
                                    className="w-full p-4 bg-slate-800/50 border border-fuchsia-500/20 rounded-2xl focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 text-white font-mono text-xs shadow-inner" 
                                />
                                <p className="text-[8px] text-slate-500 mt-2 ml-1 leading-relaxed">Dein Key wird nur lokal in deinem Browser gespeichert.</p>
                            </div>
                            <button onClick={completeOnboarding} className="w-full mt-6 bg-emerald-600 text-slate-950 py-5 rounded-[1.5rem] font-black text-sm uppercase tracking-widest shadow-xl shadow-emerald-500/20 active:scale-95 transition-all hover:bg-emerald-500">Starten</button>
                        </div>
                    </div>
                    <style>{`@keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } } .animate-bounce-subtle { animation: bounce-subtle 3s ease-in-out infinite; }`}</style>
                </div>
              )}

              {view === 'profile' && (
                <div className="min-h-screen bg-slate-950 font-sans pb-32 text-slate-100 overflow-x-hidden">
                    <div className="bg-slate-900/80 backdrop-blur-md p-6 sticky top-0 shadow-lg z-10 border-b border-white/5 rounded-b-[2.5rem] flex items-center gap-4">
                        <button onClick={() => setView('dashboard')} className="p-3 glass-card rounded-2xl hover:bg-slate-800 transition-all active:scale-90 border border-white/5"><ArrowLeft size={20} className="text-slate-300" /></button>
                        <h2 className="text-2xl font-black tracking-tight">Mein Profil</h2>
                    </div>
                    <div className="p-6 space-y-8 mt-4">
                        <div className="glass-card p-8 rounded-[2.5rem] shadow-2xl border border-white/5 space-y-8 relative overflow-hidden">
                            <div className="absolute -top-10 -left-10 w-40 h-40 bg-emerald-500/5 blur-3xl -z-10"></div>
                            <div className="flex items-center gap-4 mb-2">
                                <div className="p-3 bg-slate-800/50 rounded-2xl border border-white/5 shadow-lg"><User size={24} className="text-emerald-400" /></div>
                                <h3 className="font-black text-xl text-white tracking-tight">Körperdaten</h3>
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 block ml-1">Geschlecht</label>
                                    <div className="flex gap-3">
                                        <button onClick={() => setOnboardingData({...onboardingData, gender: 'male'})} className={`flex-1 py-4 rounded-2xl border-2 font-black text-xs uppercase tracking-widest transition-all ${onboardingData.gender === 'male' ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400 shadow-lg shadow-emerald-500/10' : 'border-slate-800 bg-slate-800/30 text-slate-500'}`}>Mann</button>

                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-slate-800/50 rounded-2xl border border-white/5 shadow-lg"><Flame size={20} className="text-amber-500"/></div>
                                        <div>
                                            <h3 className="font-black text-lg text-white tracking-tight">Sport & Aktivität</h3>
                                            <div className="flex gap-3 text-[10px] font-black uppercase tracking-widest text-amber-500/70"><span className="flex items-center gap-1"><Footprints size={12}/> {dailyLog.steps} Steps</span><span className="opacity-30">•</span><span>{totals.totalBurned} kcal</span></div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-800/50 text-amber-500 p-3 rounded-2xl border border-white/5"><Plus size={20} strokeWidth={3} /></div>
                                </div>
                            </div>
                            {showSportMenu && (
                                <div className="absolute bottom-full left-0 right-0 mb-4 glass-card rounded-[2rem] shadow-2xl border border-white/10 p-6 z-20 animate-in fade-in slide-in-from-bottom-4">
                                    <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-white tracking-tight">Aktivität</h3><button onClick={() => setShowSportMenu(false)} className="bg-slate-800 p-2 rounded-full text-slate-400 hover:text-white transition-colors"><X size={18}/></button></div>
                                    <div className="space-y-6">
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 block">Schrittzähler</label><div className="flex gap-3"><input type="number" placeholder={dailyLog.steps || "0"} value={tempSteps} onChange={(e) => setTempSteps(e.target.value)} className="flex-1 p-4 bg-slate-800/50 rounded-2xl border border-white/5 focus:outline-none focus:ring-2 focus:ring-amber-500 text-white font-bold placeholder-slate-600" /><button onClick={() => updateSport('steps')} className="bg-amber-500 text-slate-950 px-6 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-amber-500/20">OK</button></div></div>
                                        <div><label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 block">Manuelle Kalorien</label><div className="flex gap-3"><input type="number" placeholder="z.B. 300" value={tempSportKcal} onChange={(e) => setTempSportKcal(e.target.value)} className="flex-1 p-4 bg-slate-800/50 rounded-2xl border border-white/5 focus:outline-none focus:ring-2 focus:ring-amber-500 text-white font-bold placeholder-slate-600" /><button onClick={() => updateSport('manual')} className="bg-slate-700 text-white px-6 rounded-2xl font-black border border-white/10 active:scale-95 shadow-lg">+</button></div></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    <BottomNav currentView={view} setView={(v) => {
                        if (v === 'addFood_central') {
                            setSelectedMeal('snacks');
                            setView('addFood');
                        } else {
                            setView(v);
                        }
                    }} />
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CalorieApp />);
    </script>
</body>
</html>
